<!DOCTYPE html>
<html lang="ko" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>컴퓨터그래픽스 필기 마스터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class', // 이 설정이 있어야 클래스에 의한 다크모드가 작동합니다.
        }
    </script>

    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .hidden { display: none; }
    </style>

</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-200 transition-colors duration-300 min-h-screen">

    <div class="max-w-2xl mx-auto px-4 py-8">
        <header class="mb-8 text-center relative">
            <button id="theme-toggle" class="absolute right-0 top-0 p-2 rounded-lg bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 100 2h1z"></path></svg>
                <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
            </button>

            <h1 id="exam-title" class="text-2xl md:text-3xl font-bold text-indigo-600 dark:text-indigo-400 mb-2 leading-tight">시험 로딩 중...</h1>
            <div class="flex items-center justify-center gap-4 text-sm text-slate-500 dark:text-slate-400 font-medium">
                <div class="bg-white dark:bg-slate-800 px-3 py-1 rounded-full shadow-sm border border-slate-100 dark:border-slate-700">
                    문제 <span id="current-pos" class="text-indigo-600 dark:text-indigo-400">0</span> / <span id="total-pos">0</span>
                </div>
            </div>
            <div class="w-full bg-slate-200 dark:bg-slate-700 h-2 rounded-full mt-4 overflow-hidden">
                <div id="progress-bar" class="bg-indigo-500 dark:bg-indigo-400 h-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </header>

        <main id="quiz-area" class="space-y-6">
            <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-xl shadow-slate-200/50 dark:shadow-slate-950/50 p-6 md:p-8 border border-slate-100 dark:border-slate-800">
                <span id="category-badge" class="inline-block px-3 py-1 rounded-md bg-indigo-50 dark:bg-indigo-950 text-indigo-600 dark:text-indigo-300 text-xs font-bold mb-4">카테고리</span>
                <p id="question-text" class="text-lg md:text-xl font-semibold leading-relaxed mb-8 dark:text-slate-100">
                    문제를 불러오는 중입니다...
                </p>
                
                <div id="options-list" class="grid grid-cols-1 gap-3">
                    </div>
            </div>
            
            <div id="feedback" class="hidden transform transition-all duration-300">
                <div class="bg-indigo-600 dark:bg-indigo-700 rounded-2xl p-6 text-white shadow-lg">
                    <div class="flex items-start gap-3 mb-4">
                        <span class="text-2xl">💡</span>
                        <p id="explanation-text" class="text-sm md:text-base leading-snug opacity-90"></p>
                    </div>
                    <button id="next-btn" class="w-full py-4 bg-white dark:bg-slate-100 text-indigo-600 dark:text-indigo-800 font-bold rounded-xl hover:bg-indigo-50 dark:hover:bg-white transition-colors shadow-md">
                        다음 문제로 넘어가기
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div id="result-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        
        <div class="relative bg-white dark:bg-slate-900 w-full max-w-md rounded-3xl shadow-2xl overflow-hidden transform transition-all">
            <div id="result-header" class="p-8 text-center">
                <div id="result-icon" class="w-20 h-20 mx-auto rounded-full flex items-center justify-center text-4xl mb-4">
                    🎉
                </div>
                <h2 id="result-status" class="text-3xl font-bold mb-2 uppercase tracking-tight">합격</h2>
                <p id="result-score-text" class="text-slate-500 dark:text-slate-400 font-medium">당신의 점수는 <span id="final-score" class="text-2xl font-bold text-slate-800 dark:text-white">0</span>점입니다.</p>
            </div>
            
            <div class="px-8 pb-8 space-y-3">
                <div class="flex justify-between p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl">
                    <span class="text-slate-500">맞은 문제</span>
                    <span id="correct-count" class="font-bold text-emerald-600">0개</span>
                </div>
                <div class="flex justify-between p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl">
                    <span class="text-slate-500">틀린 문제</span>
                    <span id="wrong-count" class="font-bold text-rose-600">0개</span>
                </div>
                
                <button onclick="location.reload()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl transition-all shadow-lg shadow-indigo-200 dark:shadow-none mt-4">
                    다시 도전하기
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
