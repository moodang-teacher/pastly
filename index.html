<!doctype html>
<html lang="ko" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pastly | 자격증 마스터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
      if (
        localStorage.getItem("theme") === "dark" ||
        (!("theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
    <style>
      @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");
      body {
        font-family: "Pretendard", sans-serif;
        transition: background-color 0.3s;
      }
      @keyframes timerBlink {
        0%,
        49% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0.15;
        }
      }
      .timer-blink {
        animation: timerBlink 1s steps(1, end) infinite;
      }
      .hidden {
        display: none !important;
      }
      .rank-item {
        transition: all 0.3s ease;
      }
    </style>
  </head>
  <body
    class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-200 min-h-screen"
  >
    <div id="main-menu" class="max-w-2xl mx-auto px-4 py-8">
      <header class="text-center mb-4">
        <!-- <h1
          class="text-4xl font-black text-indigo-600 dark:text-indigo-400 mb-6 tracking-tight"
        >
          pastly
        </h1> -->
        <h1 class="logo" style="width: 50%; margin: 0 auto 20px">
          <img
            src="./images/pastly_logo.png"
            alt="pastly logo"
            style="width: 100%; height: 100%; object-fit: cover"
          />
        </h1>

        <div
          id="auth-section"
          class="flex flex-col items-center bg-white dark:bg-slate-900 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800"
        >
          <p
            id="auth-browser-hint"
            class="hidden text-sm text-amber-800 dark:text-amber-200 bg-amber-50 dark:bg-amber-950/40 border border-amber-200 dark:border-amber-800 rounded-xl px-3 py-2 mb-3 text-left leading-relaxed"
          ></p>

          <div
            id="login-unit"
            class="p-6 bg-white dark:bg-slate-900 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800 text-center"
          >
            <h2 class="text-xl font-black mb-4">로그인</h2>
            <p class="text-sm text-slate-500 mb-6">
              학번(또는 이름)과 비밀번호를 입력하세요.
            </p>

            <div class="space-y-3 mb-6">
              <input
                type="text"
                id="login-id"
                placeholder="학번 또는 아이디"
                class="w-full p-4 rounded-2xl border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 focus:border-indigo-500 outline-none transition-all"
              />
              <input
                type="password"
                id="login-pw"
                placeholder="비밀번호"
                class="w-full p-4 rounded-2xl border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 focus:border-indigo-500 outline-none transition-all"
              />
            </div>

            <button
              id="btn-login-submit"
              class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg hover:bg-indigo-700 transition-all"
            >
              시작하기
            </button>
          </div>

          <div id="user-unit" class="hidden text-center">
            <img
              id="user-photo"
              src=""
              class="w-20 h-20 rounded-full border-4 border-indigo-500 mb-3 mx-auto shadow-lg"
            />
            <h3 id="user-name" class="font-black text-xl mb-1">사용자</h3>
            <div class="flex items-center justify-center gap-2">
              <span
                id="user-level"
                class="px-3 py-1 bg-indigo-100 dark:bg-indigo-900 text-indigo-600 dark:text-indigo-300 rounded-full text-xs font-black uppercase"
                >LV.1 디자인 인턴</span
              >
            </div>
          </div>
        </div>
      </header>

      <div class="grid grid-cols-2 gap-4 mb-4">
        <button
          id="start-random-btn"
          class="group p-8 bg-white dark:bg-slate-900 rounded-3xl shadow-xl border-2 border-transparent hover:border-indigo-500 transition-all text-left"
        >
          <h2 class="text-xl font-bold mb-1 group-hover:text-indigo-600">
            🎲 랜덤 풀기
          </h2>
          <p class="text-slate-500 text-sm">60문제를 무작위로 풀기!</p>
        </button>
        <button
          id="start-wrong-btn"
          class="group p-8 bg-white dark:bg-slate-900 rounded-3xl shadow-xl border-2 border-transparent hover:border-rose-500 transition-all text-left"
        >
          <h2 class="text-xl font-bold mb-1 group-hover:text-rose-600">
            🔥 오답 정복
          </h2>
          <p id="wrong-count-text" class="text-slate-500 text-sm">
            복습할 오답이 없습니다.
          </p>
        </button>
      </div>

      <div
        class="bg-white dark:bg-slate-900 rounded-3xl shadow-xl p-6 border border-slate-100 dark:border-slate-800"
      >
        <h3
          class="font-black text-slate-400 text-xs uppercase tracking-widest mb-6 flex items-center gap-2"
        >
          <span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span>
          실시간 명예의 전당
        </h3>
        <div id="leaderboard-list" class="space-y-3 text-sm">
          <p class="text-center py-4 text-slate-400 italic">
            데이터를 불러오는 중...
          </p>
        </div>
      </div>
    </div>

    <div id="quiz-container" class="hidden max-w-2xl mx-auto px-4 py-8">
      <header class="mb-8 text-center relative">
        <button
          id="theme-toggle"
          class="absolute right-0 top-0 p-2 rounded-lg bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700"
        >
          <svg
            id="theme-toggle-light-icon"
            class="hidden w-5 h-5"
            fill="currentColor"
            viewBox="0 0 20 20"
          >
            <path
              d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 100 2h1z"
            ></path>
          </svg>
          <svg
            id="theme-toggle-dark-icon"
            class="hidden w-5 h-5"
            fill="currentColor"
            viewBox="0 0 20 20"
          >
            <path
              d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"
            ></path>
          </svg>
        </button>
        <h1
          id="exam-title"
          class="text-2xl font-bold text-indigo-600 dark:text-indigo-400 mb-4 tracking-tight font-black"
        >
          과목명
        </h1>
        <div class="flex items-center justify-between">
          <div
            class="bg-white dark:bg-slate-800 px-4 py-1.5 rounded-full shadow-sm border border-slate-100 dark:border-slate-700 text-sm font-bold"
          >
            문제 <span id="current-pos" class="text-indigo-600">0</span> /
            <span id="total-pos">0</span>
          </div>
          <div
            class="flex items-center gap-2 bg-white dark:bg-slate-800 px-4 py-1.5 rounded-full shadow-sm border border-slate-100 dark:border-slate-700"
          >
            <span aria-hidden="true" class="text-base leading-none">🕒</span>
            <span
              id="timer-display"
              class="font-mono text-lg font-bold text-rose-500"
              >60</span
            >
          </div>
        </div>
        <div
          class="w-full bg-slate-200 dark:bg-slate-700 h-1.5 rounded-full mt-4 overflow-hidden"
        >
          <div
            id="progress-bar"
            class="bg-indigo-500 h-full transition-all duration-300"
            style="width: 0%"
          ></div>
        </div>
      </header>

      <main id="quiz-area" class="space-y-6">
        <div
          class="bg-white dark:bg-slate-900 rounded-3xl shadow-xl p-6 md:p-8 border border-slate-50 dark:border-slate-800"
        >
          <div class="mb-4">
            <span
              id="category-badge"
              class="px-3 py-1 rounded-lg bg-indigo-50 dark:bg-indigo-950 text-indigo-600 dark:text-indigo-300 text-xs font-bold uppercase tracking-widest"
              >CATEGORY</span
            >
          </div>
          <figure id="question-figure" class="hidden mb-6">
            <img
              id="question-image"
              alt=""
              class="mx-auto w-full max-h-[min(50vh,22rem)] rounded-2xl border border-slate-200 bg-slate-50 object-contain dark:border-slate-700 dark:bg-slate-800"
              loading="lazy"
              decoding="async"
            />
          </figure>
          <p
            id="question-text"
            class="text-lg md:text-xl font-bold leading-relaxed mb-8 dark:text-slate-100"
          >
            문제를 불러오는 중입니다...
          </p>
          <div id="options-list" class="grid grid-cols-1 gap-3"></div>
        </div>

        <div id="feedback" class="hidden">
          <div class="rounded-3xl p-6 text-white shadow-lg">
            <p
              id="explanation-text"
              class="text-sm md:text-base leading-relaxed mb-5 font-medium whitespace-pre-wrap"
            ></p>
            <button
              id="next-btn"
              class="w-full py-4 bg-white font-bold rounded-2xl transition-all active:scale-95 shadow-md"
            >
              다음 문제
            </button>
          </div>
        </div>
      </main>
    </div>

    <div
      id="result-modal"
      class="hidden fixed inset-0 z-50 flex items-center justify-center px-4 overflow-y-auto py-10"
    >
      <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
      <div
        class="relative bg-white dark:bg-slate-900 w-full max-w-md rounded-3xl shadow-2xl p-8 text-center my-auto"
      >
        <div
          id="result-icon"
          class="w-20 h-20 mx-auto rounded-full flex items-center justify-center text-4xl mb-4"
        ></div>
        <h2 id="result-status" class="text-2xl font-bold mb-2 font-black"></h2>
        <p class="text-slate-500 dark:text-slate-400 mb-6 font-medium">
          최종 점수:
          <span
            id="final-score"
            class="text-2xl font-bold text-slate-800 dark:text-white"
            >0</span
          >점
        </p>

        <div
          id="subject-results"
          class="text-left space-y-5 mb-8 max-h-[40vh] overflow-y-auto pr-2"
        ></div>

        <button
          onclick="location.reload()"
          class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 transition-colors"
        >
          메인으로 이동
        </button>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
