<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Pastly - 필기시험 마스터</title>

    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      if (
        localStorage.getItem("theme") === "dark" ||
        (!("theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: { sans: ["Pretendard", "sans-serif"] },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Pretendard", sans-serif;
        -webkit-tap-highlight-color: transparent;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      * {
        font-style: normal !important;
      }
      @keyframes digitFlipUp {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(calc(-1 * var(--roll-distance)));
        }
      }
      @keyframes digitFlipDown {
        from {
          transform: translateY(var(--start-offset));
        }
        to {
          transform: translateY(
            calc(var(--start-offset) + var(--roll-distance))
          );
        }
      }
      @keyframes progressGrowth {
        0% {
          width: 0 !important;
        }
        100% {
          width: var(--target-width) !important;
        }
      }
      .animate-digit-up {
        animation: digitFlipUp 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94)
          forwards;
      }
      .animate-digit-down {
        animation: digitFlipDown 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94)
          forwards;
      }
      .progress-bar-animate {
        animation: progressGrowth 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94)
          forwards !important;
      }
      .digit-roller {
        display: inline-flex;
        position: relative;
        width: 1em;
        height: 1em;
        overflow: hidden;
        font-size: 5rem;
        font-weight: 900;
        vertical-align: middle;
      }
      .digit-roller + .digit-roller {
        margin-left: -0.25em;
      }
      .digit-roller-content {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        display: flex;
        flex-direction: column;
      }
      .avatar-tooltip {
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
        pointer-events: none;
        z-index: 10;
      }
      .avatar-tooltip::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        border: 6px solid transparent;
        border-top-color: rgba(0, 0, 0, 0.8);
      }
      .avatar-tooltip.show {
        opacity: 1;
        visibility: visible;
      }
    </style>
  </head>
  <body
    class="bg-white dark:bg-slate-950 transition-colors duration-300 font-sans"
  >
    <div class="max-w-md mx-auto min-h-screen flex flex-col p-6">
      <header class="flex justify-between items-center mb-10">
        <img
          id="pastly-logo"
          src="images/pastly_logo.png"
          alt="Pastly"
          class="h-7 w-auto object-contain cursor-pointer"
        />

        <button
          id="theme-toggle"
          class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-900 text-slate-500 transition-all active:scale-90"
        >
          <svg
            id="theme-toggle-dark-icon"
            class="hidden w-5 h-5"
            fill="currentColor"
            viewBox="0 0 20 20"
          >
            <path
              d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"
            ></path>
          </svg>
          <svg
            id="theme-toggle-light-icon"
            class="hidden w-5 h-5"
            fill="currentColor"
            viewBox="0 0 20 20"
          >
            <path
              d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
              fill-rule="evenodd"
              clip-rule="evenodd"
            ></path>
          </svg>
        </button>
      </header>

      <div id="login-unit" class="mb-6 space-y-3">
        <input
          type="text"
          id="login-id"
          placeholder="닉네임"
          class="w-full p-4 bg-slate-50 dark:bg-slate-900 rounded-2xl border-none focus:ring-2 focus:ring-indigo-500 dark:text-white outline-none transition-all font-semibold"
        />
        <input
          type="password"
          id="login-pw"
          placeholder="비밀번호"
          class="w-full p-4 bg-slate-50 dark:bg-slate-900 rounded-2xl border-none focus:ring-2 focus:ring-indigo-500 dark:text-white outline-none transition-all font-semibold"
        />
        <button
          id="btn-login-submit"
          class="w-full py-4 bg-indigo-600 text-white text-lg font-black rounded-2xl shadow-lg shadow-indigo-100 dark:shadow-none transition-all active:scale-95"
        >
          로그인
        </button>
      </div>

      <div
        id="user-unit"
        class="hidden p-5 bg-slate-50 dark:bg-slate-800 rounded-3xl border border-slate-100 dark:border-slate-800 flex items-center justify-between shadow-inner gap-4 mb-8"
      >
        <div class="flex items-center gap-4 flex-1 min-w-0">
          <label
            for="avatar-input"
            class="relative cursor-pointer group flex-none"
          >
            <img
              id="user-photo"
              src=""
              class="w-14 h-14 rounded-full border-2 border-indigo-200 object-cover bg-white shadow-sm"
            />
            <div class="avatar-tooltip">사진을 교체하려면 클릭!</div>
          </label>
          <input
            type="file"
            id="avatar-input"
            accept="image/*"
            class="hidden"
          />
          <div class="truncate">
            <span
              id="user-name"
              class="font-black text-lg text-slate-800 dark:text-white block truncate"
            ></span>
            <span
              id="user-level"
              class="block text-xs text-indigo-500 dark:text-indigo-400 font-black mt-0.5 tracking-tight uppercase"
            ></span>
          </div>
        </div>
        <button
          id="btn-logout"
          title="로그아웃"
          class="flex-none p-2.5 text-slate-400 hover:text-rose-500 rounded-2xl transition-all active:scale-90"
        >
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            ></path>
          </svg>
        </button>
      </div>

      <main id="main-menu" class="flex-1">
        <div class="grid grid-cols-2 gap-4 mb-12">
          <button
            id="start-random-btn"
            class="aspect-square p-5 bg-blue-50 dark:bg-blue-900/20 rounded-[2.5rem] border-2 border-blue-100 dark:border-blue-800 flex flex-col items-center justify-center text-center group transition-all active:scale-95"
          >
            <div
              class="w-16 h-16 bg-white dark:bg-slate-800 rounded-[1.25rem] flex items-center justify-center text-4xl mb-4 shadow-sm group-hover:rotate-6 transition-transform"
            >
              ✏️
            </div>
            <span
              class="block text-blue-800 dark:text-blue-300 font-black text-[1.05rem] tracking-tight"
              >실전 모의고사</span
            >
          </button>

          <button
            id="start-wrong-btn"
            class="aspect-square p-5 bg-rose-50 dark:bg-rose-900/20 rounded-[2.5rem] border-2 border-rose-100 dark:border-rose-800 flex flex-col items-center justify-center text-center group transition-all relative active:scale-95"
          >
            <div
              class="w-16 h-16 bg-white dark:bg-slate-800 rounded-[1.25rem] flex items-center justify-center text-4xl mb-4 shadow-sm group-hover:-rotate-6 transition-transform"
            >
              💣
            </div>
            <span
              class="block text-rose-800 dark:text-rose-300 font-black text-[1.05rem] tracking-tight"
              >오답 복습하기</span
            >
            <span
              id="wrong-count-badge"
              class="absolute top-5 right-5 bg-rose-500 text-white px-3 py-1 rounded-full font-black text-xs shadow-md"
              >0</span
            >
          </button>
        </div>

        <div class="pt-2">
          <div class="flex items-center gap-2 mb-6 ml-1">
            <span class="text-amber-400 text-xl">👑</span>
            <h3
              class="text-lg font-black text-slate-800 dark:text-slate-100 tracking-tighter"
            >
              명예의 전당
            </h3>
            <span
              class="px-2 py-1 bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-300 text-xs font-black rounded-lg"
            >
              TOP 7
            </span>
          </div>
          <div id="leaderboard-list" class="space-y-4"></div>
        </div>

        <footer
          class="text-center py-6 text-[12px] text-slate-400 font-medium tracking-widest"
        >
          &copy; 巫堂先生
        </footer>
      </main>

      <section id="quiz-container" class="hidden flex-1 flex flex-col">
        <div class="flex justify-between items-center mb-8">
          <span
            id="category-badge"
            class="px-4 py-1.5 bg-indigo-100 dark:bg-indigo-900 text-indigo-700 dark:text-indigo-300 text-xs font-black rounded-xl"
          ></span>
          <span
            id="timer-display"
            class="text-2xl font-black text-red-600 dark:text-red-400"
            >60</span
          >
        </div>

        <div class="mb-10">
          <div
            class="w-full bg-slate-100 dark:bg-slate-800 h-2.5 rounded-full overflow-hidden"
          >
            <div
              id="progress-bar"
              class="h-full bg-indigo-500 transition-all duration-300"
              style="width: 0%"
            ></div>
          </div>
          <div
            class="flex justify-between text-xs font-black text-slate-400 mt-3 tracking-widest"
          >
            <span>PROGRESS</span>
            <span
              ><span id="current-pos" class="text-indigo-500">1</span> /
              <span id="total-pos">60</span></span
            >
          </div>
        </div>

        <div
          id="question-area"
          class="flex-1 overflow-y-auto pr-1 no-scrollbar"
        >
          <h2
            id="question-text"
            class="text-xl font-bold text-slate-800 dark:text-white leading-relaxed mb-8"
          ></h2>
          <figure
            id="question-figure"
            class="hidden mb-8 rounded-[2rem] overflow-hidden border-4 border-slate-50 dark:border-slate-900 shadow-md"
          >
            <img
              id="question-image"
              src=""
              class="w-full h-auto"
              alt="이미지"
            />
          </figure>
          <div id="options-list" class="space-y-4 mb-16"></div>
        </div>
      </section>
    </div>

    <div
      id="feedback"
      class="fixed inset-x-0 bottom-0 z-50 transform translate-y-full transition-transform duration-300 ease-out hidden"
    >
      <div class="max-w-md mx-auto p-6">
        <div class="rounded-[2.5rem] p-8 shadow-2xl space-y-6">
          <p
            id="explanation-text"
            class="text-lg font-semibold leading-relaxed opacity-95 whitespace-pre-wrap"
          ></p>
          <button
            id="next-btn"
            class="w-full py-5 bg-white text-lg font-black rounded-2xl shadow-lg active:scale-95"
          >
            다음 문제
          </button>
        </div>
      </div>
    </div>

    <div
      id="result-modal"
      class="fixed inset-0 z-[60] bg-white dark:bg-slate-950 flex flex-col p-10 hidden overflow-y-auto no-scrollbar"
    >
      <div
        class="min-h-full flex flex-col justify-center items-center text-center"
      >
        <div
          class="w-24 h-24 bg-indigo-50 dark:bg-indigo-900/30 rounded-[2.5rem] flex items-center justify-center text-5xl mb-8 shadow-inner"
        >
          🏆
        </div>
        <h2
          id="result-status"
          class="text-2xl font-black text-slate-800 dark:text-white mb-2"
        ></h2>
        <div class="flex items-center justify-center gap-1 mb-12 h-32">
          <div
            id="final-score"
            class="text-indigo-600 tracking-tighter leading-none flex items-center justify-center"
          >
            0
          </div>
          <span class="text-5xl font-black text-indigo-600">점</span>
        </div>
        <div
          id="subject-results"
          class="w-full max-w-xs text-left mb-12 space-y-6 text-slate-700 dark:text-slate-300 font-bold"
        ></div>
        <button
          onclick="location.reload()"
          class="w-full max-w-xs py-5 bg-indigo-600 text-white text-xl font-black rounded-2xl shadow-xl active:scale-95 transition-transform flex-none"
        >
          확인
        </button>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
